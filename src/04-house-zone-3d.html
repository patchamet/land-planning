<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ผังพื้นที่สร้างบ้าน 3D (โซน 11-12-14-13)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    body { margin: 0; overflow: hidden; background: #1a1a2e; touch-action: none; }
    canvas { display: block; }
    #info {
      position: absolute; top: 10px; left: 10px; right: 10px;
      color: #fff; font-family: Arial, sans-serif; font-size: 14px;
      background: rgba(0,0,0,0.5); padding: 10px 14px; border-radius: 6px;
      max-width: 360px;
    }
    #info h3 { margin: 0 0 4px 0; font-size: 15px; }
    #info p { margin: 0; font-size: 12px; color: #ccc; }
    #sun-control {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); padding: 10px 16px; border-radius: 8px;
      display: flex; align-items: center; gap: 10px; color: #fff;
      font-family: Arial, sans-serif; font-size: 14px;
      width: calc(100% - 32px); max-width: 480px; box-sizing: border-box;
    }
    #sun-control input[type=range] { flex: 1; min-width: 0; cursor: pointer; }
    #sun-time { min-width: 60px; text-align: center; font-weight: bold; white-space: nowrap; }
    @media (max-width: 480px) {
      #info { font-size: 12px; padding: 8px 10px; }
      #info h3 { font-size: 13px; }
      #info p { font-size: 10px; }
      #info p:last-child { display: none; }
      #sun-control { font-size: 12px; padding: 8px 12px; gap: 6px; bottom: 12px; }
      #sun-time { font-size: 12px; min-width: 50px; }
    }
  </style>
</head>
<body>
  <div id="info">
    <h3>ผังพื้นที่สร้างบ้าน 3D</h3>
    <p>โซน 11-12-14-13 (~540 ตร.ม.)</p>
    <p>คลิกลาก = หมุน | scroll = ซูม | คลิกขวาลาก = เลื่อน</p>
  </div>

  <div id="sun-control">
    <span>🌅 06:00</span>
    <input type="range" id="sun-slider" min="6" max="18" step="0.25" value="10">
    <span>18:00 🌇</span>
    <span id="sun-time">☀ 10:00</span>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ===== Scene, Camera, Renderer =====
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd4e6f1);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(32, 18, -18);
    camera.lookAt(13, 0, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Post-processing: Bloom
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.3,   // strength
      0.5,   // radius
      0.85   // threshold
    );
    composer.addPass(bloomPass);

    // CSS2D label renderer
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    // ===== OrbitControls =====
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(14, 0, 9);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    // ===== Double Tap to Reset Camera (Mobile UX) =====
    const DEFAULT_CAM = new THREE.Vector3(32, 18, -18);
    const DEFAULT_TARGET = new THREE.Vector3(13, 0, 7);
    let lastTap = 0;
    let resetAnim = null;

    function resetCamera() {
      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();
      let progress = 0;
      if (resetAnim) cancelAnimationFrame(resetAnim);
      function animateReset() {
        progress += 0.05;
        if (progress >= 1) {
          camera.position.copy(DEFAULT_CAM);
          controls.target.copy(DEFAULT_TARGET);
          controls.update();
          resetAnim = null;
          return;
        }
        const t = progress * progress * (3 - 2 * progress); // smoothstep
        camera.position.lerpVectors(startPos, DEFAULT_CAM, t);
        controls.target.lerpVectors(startTarget, DEFAULT_TARGET, t);
        controls.update();
        resetAnim = requestAnimationFrame(animateReset);
      }
      animateReset();
    }

    // Mobile: double tap
    renderer.domElement.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTap < 300) {
        e.preventDefault();
        resetCamera();
      }
      lastTap = now;
    });

    // Desktop: double click
    renderer.domElement.addEventListener('dblclick', () => resetCamera());

    // ===== Lights + Shadows =====
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xfff8e7, 1.0);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -25;
    dirLight.shadow.camera.right = 25;
    dirLight.shadow.camera.top = 25;
    dirLight.shadow.camera.bottom = -25;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 80;
    dirLight.shadow.bias = -0.002;
    scene.add(dirLight);
    // Fill light (ambient sky bounce)
    const fillLight = new THREE.DirectionalLight(0xc4d8f0, 0.3);
    fillLight.position.set(-15, 10, 20);
    scene.add(fillLight);

    // House interior light (evening glow) — must be before updateSunPosition()
    const houseLight = new THREE.PointLight(0xffe4b0, 0, 8);
    houseLight.position.set(14, 1.9, 9); // center of house (will update after house coords)
    scene.add(houseLight);

    // ===== Step 6: Sun position from time slider =====
    const sunSlider = document.getElementById('sun-slider');
    const sunTimeLabel = document.getElementById('sun-time');
    const NORTH_OFFSET = 25 * Math.PI / 180; // north rotated 25° CW
    const SUN_DIST = 40; // distance of light from scene center
    const MAX_ELEV = 70 * Math.PI / 180; // max sun elevation ~70° (lat 14°N)

    // Visual sun sphere (translucent glow)
    const sunSphereGeo = new THREE.SphereGeometry(1.5, 16, 12);
    const sunSphereMat = new THREE.MeshBasicMaterial({
      color: 0xffdd44, transparent: true, opacity: 0.35,
      depthWrite: false
    });
    const sunSphere = new THREE.Mesh(sunSphereGeo, sunSphereMat);
    scene.add(sunSphere);

    // Sun glow ring (larger, more transparent)
    const sunGlowGeo = new THREE.SphereGeometry(3, 16, 12);
    const sunGlowMat = new THREE.MeshBasicMaterial({
      color: 0xffee88, transparent: true, opacity: 0.12,
      depthWrite: false, side: THREE.BackSide
    });
    const sunGlow = new THREE.Mesh(sunGlowGeo, sunGlowMat);
    scene.add(sunGlow);

    function updateSunPosition(hour) {
      // t: 0=sunrise(6:00), 0.5=noon(12:00), 1=sunset(18:00)
      const t = (hour - 6) / 12;

      // Azimuth from north (CW): east=90° → south=180° → west=270°
      const azimuth = (90 + t * 180) * Math.PI / 180 + NORTH_OFFSET;

      // Elevation: sine curve peaking at noon
      const elevation = MAX_ELEV * Math.sin(t * Math.PI);

      // 3D position
      const hDist = SUN_DIST * Math.cos(elevation);
      const sunX = hDist * Math.sin(azimuth) + 16; // offset to scene center
      const sunY = SUN_DIST * Math.sin(elevation);
      const sunZ = -hDist * Math.cos(azimuth) + 10;
      dirLight.position.set(sunX, sunY, sunZ);
      dirLight.target.position.set(16, 0, 10);
      dirLight.target.updateMatrixWorld();

      // Update visual sun position
      sunSphere.position.set(sunX, sunY, sunZ);
      sunGlow.position.set(sunX, sunY, sunZ);

      // Light intensity: dimmer at sunrise/sunset
      const sinT = Math.sin(t * Math.PI);
      dirLight.intensity = 0.4 + 0.8 * sinT;

      // Light color: warm at sunrise/sunset, white at noon
      const warmth = 1 - sinT; // 1=warm, 0=neutral
      const r = 1.0;
      const g = 1.0 - warmth * 0.15;
      const b = 1.0 - warmth * 0.35;
      dirLight.color.setRGB(r, g, b);

      // Sun sphere color matches light (warmer at edges of day)
      sunSphereMat.color.setRGB(1.0, 0.85 + 0.15 * sinT, 0.3 + 0.4 * sinT);
      sunSphereMat.opacity = 0.2 + 0.25 * sinT;
      sunGlowMat.color.setRGB(1.0, 0.9 + 0.1 * sinT, 0.5 + 0.3 * sinT);
      sunGlowMat.opacity = 0.06 + 0.12 * sinT;

      // Ambient: slightly warmer/dimmer at edges
      ambient.intensity = 0.3 + 0.3 * sinT;

      // Update label
      const h = Math.floor(hour);
      const m = Math.round((hour - h) * 60);
      sunTimeLabel.textContent = `☀ ${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

      // House light: ramp up from 17:00 to 18:00
      const lampT = Math.max(0, hour - 17);
      houseLight.intensity = lampT * 1.5;

      // Sky color changes with time of day
      const skyWarm = new THREE.Color(0xf0c8a0);   // sunrise/sunset
      const skyMid = new THREE.Color(0xc8e0f0);    // 09:00 / 15:00
      const skyNoon = new THREE.Color(0xa0d4f0);    // noon
      const skyResult = new THREE.Color();
      if (t <= 0.25) {
        skyResult.lerpColors(skyWarm, skyMid, t / 0.25);
      } else if (t <= 0.5) {
        skyResult.lerpColors(skyMid, skyNoon, (t - 0.25) / 0.25);
      } else if (t <= 0.75) {
        skyResult.lerpColors(skyNoon, skyMid, (t - 0.5) / 0.25);
      } else {
        skyResult.lerpColors(skyMid, skyWarm, (t - 0.75) / 0.25);
      }
      scene.background = skyResult;
    }

    sunSlider.addEventListener('input', () => updateSunPosition(parseFloat(sunSlider.value)));
    updateSunPosition(10); // initial: 10:00

    // ===== Coordinate conversion: SVG → 3D =====
    // Origin = node 11 (SVG 150,648), scale: 7 SVG units = 1m
    function svgTo3D(sx, sy) {
      return { x: (sx - 150) / 7, z: (sy - 648) / 7 };
    }

    // ===== Zone ground (trapezoid 11-12-14-13) =====
    const n11 = svgTo3D(150, 648); // (0, 0)
    const n12 = svgTo3D(381, 648); // (33, 0)
    const n14 = svgTo3D(320, 780); // (24.3, 18.9)
    const n13 = svgTo3D(150, 780); // (0, 18.9)

    const groundShape = new THREE.Shape();
    groundShape.moveTo(n11.x, -n11.z); // negate z for Shape (2D y = -z)
    groundShape.lineTo(n12.x, -n12.z);
    groundShape.lineTo(n14.x, -n14.z);
    groundShape.lineTo(n13.x, -n13.z);
    groundShape.closePath();

    const groundGeo = new THREE.ShapeGeometry(groundShape);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x4dbb4d,
      transparent: true,
      opacity: 0.4,
      side: THREE.DoubleSide
    });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    groundMesh.rotation.x = -Math.PI / 2; // lay flat on x-z plane
    groundMesh.position.y = 0;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // ===== Zone boundary outline =====
    const boundaryPoints = [
      new THREE.Vector3(n11.x, 0.02, n11.z),
      new THREE.Vector3(n12.x, 0.02, n12.z),
      new THREE.Vector3(n14.x, 0.02, n14.z),
      new THREE.Vector3(n13.x, 0.02, n13.z),
      new THREE.Vector3(n11.x, 0.02, n11.z)
    ];
    const boundaryGeo = new THREE.BufferGeometry().setFromPoints(boundaryPoints);
    const boundaryLine = new THREE.Line(boundaryGeo, new THREE.LineBasicMaterial({ color: 0x222222, linewidth: 2 }));
    scene.add(boundaryLine);

    // (node markers removed)

    // ===== Step 2: House + Parking =====

    // Parking (carport): 6×6m, flush with road, y=0 (flat slab)
    // SVG top-left: (227, 648) → 3D: (11, 0)
    const parkingGeo = new THREE.BoxGeometry(6, 0.1, 6);
    const parkingMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0 });
    const parking = new THREE.Mesh(parkingGeo, parkingMat);
    parking.position.set(11 + 3, 0.05, 0 + 3);
    parking.receiveShadow = true;
    scene.add(parking);

    // Parking roof (flat carport cover, 6×6m, height 2.8m)
    const carportRoofGeo = new THREE.BoxGeometry(6, 0.08, 6);
    const carportRoofMat = new THREE.MeshStandardMaterial({ color: 0x6a6a6a, transparent: true, opacity: 0.55 });
    const carportRoof = new THREE.Mesh(carportRoofGeo, carportRoofMat);
    carportRoof.position.set(11 + 3, 2.8, 0 + 3);
    carportRoof.castShadow = true;
    scene.add(carportRoof);

    // Carport pillars (4 corners)
    const pillarGeo = new THREE.CylinderGeometry(0.1, 0.1, 2.8, 8);
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0xfafafa });
    [[11.3, 0.3], [16.7, 0.3], [11.3, 5.7], [16.7, 5.7]].forEach(([px, pz]) => {
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.set(px, 1.4, pz);
      scene.add(pillar);
    });

    // House walls: 6×6m, height 3m, raised 0.5m (ยกพื้น 0.5ม.)
    // SVG top-left: (227, 690) → 3D: (11, 6)
    const houseX = 11;
    const houseZ = 6;
    const houseW = 6;
    const houseD = 6;
    const houseH = 3;
    const houseBase = 0.4; // ยกพื้น 0.4ม.

    const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

    // Solid base walls (ฐานยกพื้นปิดทึบ 4 ด้าน)
    const baseMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0 });
    // Front base (z = houseZ)
    const baseFrontGeo = new THREE.BoxGeometry(houseW, houseBase, 0.15);
    const baseFront = new THREE.Mesh(baseFrontGeo, baseMat);
    baseFront.position.set(houseX + houseW / 2, houseBase / 2, houseZ + 0.075);
    baseFront.castShadow = true; baseFront.receiveShadow = true;
    scene.add(baseFront);
    // Back base (z = houseZ + houseD)
    const baseBackGeo = new THREE.BoxGeometry(houseW, houseBase, 0.15);
    const baseBack = new THREE.Mesh(baseBackGeo, baseMat);
    baseBack.position.set(houseX + houseW / 2, houseBase / 2, houseZ + houseD - 0.075);
    baseBack.castShadow = true; baseBack.receiveShadow = true;
    scene.add(baseBack);
    // Left base (x = houseX)
    const baseLeftGeo = new THREE.BoxGeometry(0.15, houseBase, houseD);
    const baseLeft = new THREE.Mesh(baseLeftGeo, baseMat);
    baseLeft.position.set(houseX + 0.075, houseBase / 2, houseZ + houseD / 2);
    baseLeft.castShadow = true; baseLeft.receiveShadow = true;
    scene.add(baseLeft);
    // Right base (x = houseX + houseW)
    const baseRightGeo = new THREE.BoxGeometry(0.15, houseBase, houseD);
    const baseRight = new THREE.Mesh(baseRightGeo, baseMat);
    baseRight.position.set(houseX + houseW - 0.075, houseBase / 2, houseZ + houseD / 2);
    baseRight.castShadow = true; baseRight.receiveShadow = true;
    scene.add(baseRight);

    // 4 walls (thin boxes)
    // Front wall (facing parking, z=6) with door gap shifted 1m toward veggie garden
    // Left portion of front wall
    const frontLeftGeo = new THREE.BoxGeometry(3, houseH, 0.15);
    const frontLeft = new THREE.Mesh(frontLeftGeo, wallMat);
    frontLeft.position.set(houseX + 1.5, houseBase + houseH / 2, houseZ + 0.075);
    frontLeft.castShadow = true; frontLeft.receiveShadow = true;
    scene.add(frontLeft);
    // Right portion of front wall
    const frontRightGeo = new THREE.BoxGeometry(1.7, houseH, 0.15);
    const frontRight = new THREE.Mesh(frontRightGeo, wallMat);
    frontRight.position.set(houseX + 5.15, houseBase + houseH / 2, houseZ + 0.075);
    frontRight.castShadow = true; frontRight.receiveShadow = true;
    scene.add(frontRight);
    // Door frame top (above door)
    const doorTopGeo = new THREE.BoxGeometry(1.3, 0.8, 0.15);
    const doorTop = new THREE.Mesh(doorTopGeo, wallMat);
    doorTop.position.set(houseX + 4, houseBase + 2.6, houseZ + 0.075);
    doorTop.castShadow = true;
    scene.add(doorTop);
    // Front door panel (ประตูหน้า)
    const doorMat = new THREE.MeshStandardMaterial({ color: 0x8b7355 });
    const frontDoorH = 2.2;
    const frontDoorGeo = new THREE.BoxGeometry(1.3, frontDoorH, 0.08);
    const frontDoor = new THREE.Mesh(frontDoorGeo, doorMat);
    frontDoor.position.set(houseX + 3.65, houseBase + frontDoorH / 2, houseZ + 0.075);
    frontDoor.castShadow = true;
    scene.add(frontDoor);
    // Door handle (front)
    const handleMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.3 });
    const fHandleGeo = new THREE.BoxGeometry(0.08, 0.2, 0.06);
    const fHandle = new THREE.Mesh(fHandleGeo, handleMat);
    fHandle.position.set(houseX + 3.25, houseBase + 1.1, houseZ + 0.12);
    scene.add(fHandle);

    // Back wall (z=12)
    const backGeo = new THREE.BoxGeometry(houseW, houseH, 0.15);
    const backWall = new THREE.Mesh(backGeo, wallMat);
    backWall.position.set(houseX + 3, houseBase + houseH / 2, houseZ + houseD - 0.075);
    backWall.castShadow = true; backWall.receiveShadow = true;
    scene.add(backWall);

    // Left wall (x=11)
    const leftGeo = new THREE.BoxGeometry(0.15, houseH, houseD);
    const leftWall = new THREE.Mesh(leftGeo, wallMat);
    leftWall.position.set(houseX + 0.075, houseBase + houseH / 2, houseZ + 3);
    leftWall.castShadow = true; leftWall.receiveShadow = true;
    scene.add(leftWall);

    // Right wall (x=17) with door gap for veggie garden
    const rightTopGeo = new THREE.BoxGeometry(0.15, houseH, 2);
    const rightTop = new THREE.Mesh(rightTopGeo, wallMat);
    rightTop.position.set(houseX + houseW - 0.075, houseBase + houseH / 2, houseZ + 1);
    rightTop.castShadow = true; rightTop.receiveShadow = true;
    scene.add(rightTop);
    const rightBotGeo = new THREE.BoxGeometry(0.15, houseH, 2);
    const rightBot = new THREE.Mesh(rightBotGeo, wallMat);
    rightBot.position.set(houseX + houseW - 0.075, houseBase + houseH / 2, houseZ + 5);
    rightBot.castShadow = true; rightBot.receiveShadow = true;
    scene.add(rightBot);
    const rightDoorTopGeo = new THREE.BoxGeometry(0.15, 0.8, 2);
    const rightDoorTop = new THREE.Mesh(rightDoorTopGeo, wallMat);
    rightDoorTop.position.set(houseX + houseW - 0.075, houseBase + 2.6, houseZ + 3);
    rightDoorTop.castShadow = true;
    scene.add(rightDoorTop);
    // Right door panel (ประตูข้างฝั่งสวนผัก)
    const rightDoorH = 2.2;
    const rightDoorGeo = new THREE.BoxGeometry(0.08, rightDoorH, 2);
    const rightDoorPanel = new THREE.Mesh(rightDoorGeo, doorMat);
    rightDoorPanel.position.set(houseX + houseW - 0.075, houseBase + rightDoorH / 2, houseZ + 3);
    rightDoorPanel.castShadow = true;
    scene.add(rightDoorPanel);
    // Door handle (right)
    const rHandleGeo = new THREE.BoxGeometry(0.06, 0.2, 0.08);
    const rHandle = new THREE.Mesh(rHandleGeo, handleMat);
    rHandle.position.set(houseX + houseW - 0.12, houseBase + 1.1, houseZ + 2.3);
    scene.add(rHandle);

    // Floor (raised 0.5m)
    const floorGeo = new THREE.BoxGeometry(houseW, 0.15, houseD);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(houseX + 3, houseBase + 0.075, houseZ + 3);
    floor.receiveShadow = true;
    scene.add(floor);

    // Raised platform in front of house door (พื้นยกระดับหน้าประตู): 6×1.5m, height 0.2m
    const platH = 0.2;
    const platDepth = 1.5;
    const platGeo = new THREE.BoxGeometry(houseW, 0.15, platDepth);
    const platMesh = new THREE.Mesh(platGeo, floorMat);
    platMesh.position.set(houseX + houseW / 2, platH + 0.075, houseZ - platDepth / 2);
    platMesh.receiveShadow = true;
    platMesh.castShadow = true;
    scene.add(platMesh);
    // Platform base walls (3 sides — back connects to house)
    const platBaseFrontGeo = new THREE.BoxGeometry(houseW, platH, 0.15);
    const platBaseFront = new THREE.Mesh(platBaseFrontGeo, baseMat);
    platBaseFront.position.set(houseX + houseW / 2, platH / 2, houseZ - platDepth + 0.075);
    scene.add(platBaseFront);
    const platBaseLeftGeo = new THREE.BoxGeometry(0.15, platH, platDepth);
    const platBaseLeft = new THREE.Mesh(platBaseLeftGeo, baseMat);
    platBaseLeft.position.set(houseX + 0.075, platH / 2, houseZ - platDepth / 2);
    scene.add(platBaseLeft);
    const platBaseRightGeo = new THREE.BoxGeometry(0.15, platH, platDepth);
    const platBaseRight = new THREE.Mesh(platBaseRightGeo, baseMat);
    platBaseRight.position.set(houseX + houseW - 0.075, platH / 2, houseZ - platDepth / 2);
    scene.add(platBaseRight);

    // Roof (hip roof / ทรงปั้นหยา) — 4 sloping faces, no gable
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
    const roofOverhang = 0.5; // ชายคายื่น 0.5m
    const roofH = 2.2; // ความสูงหลังคา
    const roofY = houseBase + houseH; // ฐานหลังคา
    // Eave corners (base of roof, with overhang)
    const e0 = new THREE.Vector3(houseX - roofOverhang, roofY, houseZ - roofOverhang);           // front-left
    const e1 = new THREE.Vector3(houseX + houseW + roofOverhang, roofY, houseZ - roofOverhang);  // front-right
    const e2 = new THREE.Vector3(houseX + houseW + roofOverhang, roofY, houseZ + houseD + roofOverhang); // back-right
    const e3 = new THREE.Vector3(houseX - roofOverhang, roofY, houseZ + houseD + roofOverhang);  // back-left
    // Ridge (สันหลังคา): short ridge line centered, running along Z (front-back)
    const ridgeInset = 2.0; // ridge shorter than eave by 2m each side
    const r0 = new THREE.Vector3(houseX + houseW / 2, roofY + roofH, houseZ + ridgeInset);       // ridge front
    const r1 = new THREE.Vector3(houseX + houseW / 2, roofY + roofH, houseZ + houseD - ridgeInset); // ridge back
    // 4 faces of hip roof
    function makeRoofFace(a, b, c, d) {
      const geo = d ? new THREE.BufferGeometry() : new THREE.BufferGeometry();
      const verts = d
        ? [a.x,a.y,a.z, b.x,b.y,b.z, c.x,c.y,c.z, a.x,a.y,a.z, c.x,c.y,c.z, d.x,d.y,d.z]
        : [a.x,a.y,a.z, b.x,b.y,b.z, c.x,c.y,c.z];
      geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
      geo.computeVertexNormals();
      const mesh = new THREE.Mesh(geo, roofMat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }
    // Left slope (e0 → e3 → r1 → r0) — quad
    scene.add(makeRoofFace(e0, e3, r1, r0));
    // Right slope (e1 → e2 → r1 → r0) — quad (reversed winding)
    scene.add(makeRoofFace(e2, e1, r0, r1));
    // Front triangle (e0 → e1 → r0)
    scene.add(makeRoofFace(e0, r0, e1));
    // Back triangle (e3 → e2 → r1)
    scene.add(makeRoofFace(e3, e2, r1));

    // Terrace (ชานบ้าน): 3×6m, attached to right wall of house, aligned with house front/back
    // SVG: (269, 690), width=21(3m), height=42(6m)
    const terraceX = (269 - 150) / 7;  // 17
    const terraceZ = (690 - 648) / 7;  // 6 (same as houseZ)
    const terraceW = 3;
    const terraceD = 6;
    const terraceGeo = new THREE.BoxGeometry(terraceW, 0.15, terraceD);
    const terraceMat = new THREE.MeshStandardMaterial({ color: 0xc8b8a0 });
    const terrace = new THREE.Mesh(terraceGeo, terraceMat);
    terrace.position.set(terraceX + terraceW / 2, houseBase + 0.075, terraceZ + terraceD / 2);
    terrace.receiveShadow = true;
    terrace.castShadow = true;
    scene.add(terrace);

    // Terrace solid base walls (ฐานชานบ้านปิดทึบ 3 ด้าน — ไม่รวมด้านติดบ้าน)
    // Right base
    const tBaseRightGeo = new THREE.BoxGeometry(0.15, houseBase, terraceD);
    const tBaseRight = new THREE.Mesh(tBaseRightGeo, baseMat);
    tBaseRight.position.set(terraceX + terraceW - 0.075, houseBase / 2, terraceZ + terraceD / 2);
    scene.add(tBaseRight);
    // Front base
    const tBaseFrontGeo = new THREE.BoxGeometry(terraceW, houseBase, 0.15);
    const tBaseFront = new THREE.Mesh(tBaseFrontGeo, baseMat);
    tBaseFront.position.set(terraceX + terraceW / 2, houseBase / 2, terraceZ + 0.075);
    scene.add(tBaseFront);
    // Back base
    const tBaseBackGeo = new THREE.BoxGeometry(terraceW, houseBase, 0.15);
    const tBaseBack = new THREE.Mesh(tBaseBackGeo, baseMat);
    tBaseBack.position.set(terraceX + terraceW / 2, houseBase / 2, terraceZ + terraceD - 0.075);
    scene.add(tBaseBack);

    // Terrace roof: shed/lean-to (หลังคาเพิงหมาแหงน) — slopes away from house wall
    const tRoofMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
    const tRoofOverhang = 0.3;
    const tRoofHighY = houseBase + 2.8;  // high side (attached to house wall)
    const tRoofLowY = houseBase + 2.2;   // low side (outer edge)
    const tRoofGeo = new THREE.BufferGeometry();
    // 4 corners of the sloped roof plane
    const tr0 = [terraceX - tRoofOverhang, tRoofHighY, terraceZ - tRoofOverhang];           // high front-left
    const tr1 = [terraceX - tRoofOverhang, tRoofHighY, terraceZ + terraceD + tRoofOverhang]; // high back-left
    const tr2 = [terraceX + terraceW + tRoofOverhang, tRoofLowY, terraceZ + terraceD + tRoofOverhang]; // low back-right
    const tr3 = [terraceX + terraceW + tRoofOverhang, tRoofLowY, terraceZ - tRoofOverhang];  // low front-right
    tRoofGeo.setAttribute('position', new THREE.Float32BufferAttribute([
      ...tr0, ...tr1, ...tr2,  ...tr0, ...tr2, ...tr3
    ], 3));
    tRoofGeo.computeVertexNormals();
    const tRoofMesh = new THREE.Mesh(tRoofGeo, tRoofMat);
    tRoofMesh.castShadow = true;
    scene.add(tRoofMesh);
    // Roof thickness (thin slab underneath)
    const tRoofThickGeo = new THREE.BufferGeometry();
    const th = 0.06;
    const tr0b = [tr0[0], tr0[1] - th, tr0[2]];
    const tr1b = [tr1[0], tr1[1] - th, tr1[2]];
    const tr2b = [tr2[0], tr2[1] - th, tr2[2]];
    const tr3b = [tr3[0], tr3[1] - th, tr3[2]];
    tRoofThickGeo.setAttribute('position', new THREE.Float32BufferAttribute([
      ...tr0b, ...tr2b, ...tr1b,  ...tr0b, ...tr3b, ...tr2b
    ], 3));
    tRoofThickGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(tRoofThickGeo, tRoofMat));
    // Support posts (2 posts on outer edge)
    const tPostMat = new THREE.MeshStandardMaterial({ color: 0xfafafa });
    [terraceZ + 0.3, terraceZ + terraceD - 0.3].forEach(pz => {
      const postH = tRoofLowY - houseBase;
      const postGeo = new THREE.CylinderGeometry(0.06, 0.06, postH, 8);
      const post = new THREE.Mesh(postGeo, tPostMat);
      post.position.set(terraceX + terraceW - 0.15, houseBase + postH / 2, pz);
      post.castShadow = true;
      scene.add(post);
    });

    // Terrace railing — steel bar style (ซี่เหล็กโปร่ง) 3 sides
    const railMetal = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8, roughness: 0.25 });
    const railH = 0.9;
    const railY = houseBase + railH / 2;
    const barRadius = 0.015;
    const barSpacing = 0.12;

    // Helper: top rail bar + vertical bars along a direction
    function makeBarRailing(startX, startZ, endX, endZ) {
      const dx = endX - startX, dz = endZ - startZ;
      const len = Math.sqrt(dx * dx + dz * dz);
      const angle = Math.atan2(dx, dz);
      // Top horizontal rail
      const topGeo = new THREE.CylinderGeometry(0.02, 0.02, len, 8);
      topGeo.rotateX(Math.PI / 2);
      const topRail = new THREE.Mesh(topGeo, railMetal);
      topRail.position.set((startX + endX) / 2, houseBase + railH, (startZ + endZ) / 2);
      topRail.rotation.y = angle;
      scene.add(topRail);
      // Bottom horizontal rail
      const botGeo = new THREE.CylinderGeometry(0.02, 0.02, len, 8);
      botGeo.rotateX(Math.PI / 2);
      const botRail = new THREE.Mesh(botGeo, railMetal);
      botRail.position.set((startX + endX) / 2, houseBase + 0.1, (startZ + endZ) / 2);
      botRail.rotation.y = angle;
      scene.add(botRail);
      // Vertical bars
      const count = Math.floor(len / barSpacing);
      for (let i = 0; i <= count; i++) {
        const t = i / count;
        const bx = startX + dx * t;
        const bz = startZ + dz * t;
        const barGeo = new THREE.CylinderGeometry(barRadius, barRadius, railH, 6);
        const bar = new THREE.Mesh(barGeo, railMetal);
        bar.position.set(bx, railY, bz);
        scene.add(bar);
      }
    }

    // Right side (x = terraceX + terraceW)
    makeBarRailing(terraceX + terraceW, terraceZ, terraceX + terraceW, terraceZ + terraceD);
    // Front side (z = terraceZ) — split with gap for stairs (1.2m opening in the middle)
    const stairW = 1.2;
    const stairCenter = terraceX + terraceW / 2;
    makeBarRailing(terraceX, terraceZ, stairCenter - stairW / 2, terraceZ);
    makeBarRailing(stairCenter + stairW / 2, terraceZ, terraceX + terraceW, terraceZ);
    // Back side (z = terraceZ + terraceD)
    makeBarRailing(terraceX, terraceZ + terraceD, terraceX + terraceW, terraceZ + terraceD);

    // Stairs at front of terrace toward parking (บันไดชานบ้านฝั่งลานจอดรถ)
    const tStairMat = new THREE.MeshStandardMaterial({ color: 0xc8b8a0 });
    const tStairSteps = 3;
    const tStairStepH = houseBase / tStairSteps;
    const tStairDepth = 0.3;
    for (let s = 0; s < tStairSteps; s++) {
      const stepGeo = new THREE.BoxGeometry(stairW, tStairStepH, tStairDepth);
      const step = new THREE.Mesh(stepGeo, tStairMat);
      step.position.set(
        stairCenter,
        houseBase - tStairStepH * s - tStairStepH / 2,
        terraceZ - tStairDepth / 2 - s * tStairDepth
      );
      step.receiveShadow = true;
      step.castShadow = true;
      scene.add(step);
    }

    // Update houseLight position now that house coords are defined
    houseLight.position.set(houseX + 3, houseBase + 1.5, houseZ + 3);

    // ===== Step 3: Trees + Veggie garden + Water tank =====

    // Helper: create a tree (trunk cylinder + canopy sphere)
    function createTree(x, z, trunkH, trunkR, canopyR, canopyColor) {
      const group = new THREE.Group();
      // Trunk
      const trunkGeo = new THREE.CylinderGeometry(trunkR, trunkR * 1.3, trunkH, 8);
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B6914 });
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = trunkH / 2;
      trunk.castShadow = true;
      group.add(trunk);
      // Canopy
      const canopyGeo = new THREE.SphereGeometry(canopyR, 12, 10);
      const canopyMat = new THREE.MeshStandardMaterial({ color: canopyColor, transparent: true, opacity: 0.85 });
      const canopy = new THREE.Mesh(canopyGeo, canopyMat);
      canopy.position.y = trunkH + canopyR * 0.6;
      canopy.castShadow = true;
      group.add(canopy);

      group.position.set(x, 0, z);
      return group;
    }

    // Large trees: west of house (block afternoon sun)
    // SVG: (192,682), (185,712), (202,734)
    const bigTree1 = createTree(
      (192 - 150) / 7, (682 - 648) / 7,  // x=6.0, z=4.9
      4, 0.2, 2.5, 0x3a9a3a
    );
    scene.add(bigTree1);

    const bigTree2 = createTree(
      (185 - 150) / 7, (712 - 648) / 7,  // x=5.0, z=9.1
      5, 0.25, 3.0, 0x2e8b2e
    );
    scene.add(bigTree2);

    const bigTree3 = createTree(
      (202 - 150) / 7, (734 - 648) / 7,  // x=7.4, z=12.3
      3.5, 0.18, 2.2, 0x3a9a3a
    );
    scene.add(bigTree3);

    // Fruit trees: lower-right
    // SVG: (286,751), (309,753)
    const fruitTree1 = createTree(
      (286 - 150) / 7, (751 - 648) / 7,  // x=19.4, z=14.7
      2.5, 0.12, 1.5, 0x6aaa3a
    );
    scene.add(fruitTree1);

    const fruitTree2 = createTree(
      (309 - 150) / 7, (753 - 648) / 7,  // x=22.7, z=15.0
      2.8, 0.14, 1.7, 0x6aaa3a
    );
    scene.add(fruitTree2);

    // Vegetable garden: raised bed
    // SVG top-left: (300, 670), size 35×38 SVG = 5×5.4m
    const vegX = (300 - 150) / 7;  // 21.4
    const vegZ = (670 - 648) / 7;  // 3.1
    const vegW = 35 / 7;           // 5
    const vegD = 38 / 7;           // 5.4

    // Small veggie plants scattered in the garden area
    const vegPlantMat = new THREE.MeshStandardMaterial({ color: 0x55aa33 });
    const vegSoilMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a });
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        const px = vegX + 0.5 + row * 1.0;
        const pz = vegZ + 0.5 + col * 1.08;
        // Small soil mound
        const moundGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.1, 6);
        const mound = new THREE.Mesh(moundGeo, vegSoilMat);
        mound.position.set(px, 0.05, pz);
        scene.add(mound);
        // Small plant (cone + tiny sphere)
        const stemGeo = new THREE.CylinderGeometry(0.02, 0.03, 0.3 + Math.random() * 0.2, 5);
        const stem = new THREE.Mesh(stemGeo, new THREE.MeshStandardMaterial({ color: 0x3a7a1a }));
        stem.position.set(px, 0.25, pz);
        scene.add(stem);
        const leafGeo = new THREE.SphereGeometry(0.12 + Math.random() * 0.08, 6, 5);
        const leaf = new THREE.Mesh(leafGeo, vegPlantMat);
        leaf.position.set(px, 0.4 + Math.random() * 0.1, pz);
        leaf.scale.y = 0.6;
        scene.add(leaf);
      }
    }

    // Rain water tank: cylinder
    // SVG: (258, 735), behind house
    const tankX = (258 - 150) / 7;  // 15.4
    const tankZ = (735 - 648) / 7;  // 12.4
    const tankGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.2, 16);
    const tankMat = new THREE.MeshStandardMaterial({ color: 0x8ec8e8 });
    const tank = new THREE.Mesh(tankGeo, tankMat);
    tank.position.set(tankX + 0.6, 0.6, tankZ + 0.8);
    tank.castShadow = true; tank.receiveShadow = true;
    scene.add(tank);
    // Tank lid
    const lidGeo = new THREE.CylinderGeometry(0.52, 0.52, 0.06, 16);
    const lidMat = new THREE.MeshStandardMaterial({ color: 0x4499aa });
    const lid = new THREE.Mesh(lidGeo, lidMat);
    lid.position.set(tankX + 0.6, 1.23, tankZ + 0.8);
    scene.add(lid);

    // ===== Step 4: Bamboo + Road + Waterway + Bridge =====

    // Helper: create bamboo clump (thin stalks + small canopy)
    function createBamboo(x, z) {
      const h = 4 + Math.random() * 2; // 4-6m
      const group = new THREE.Group();
      // 2-3 thin stalks
      for (let i = 0; i < 3; i++) {
        const dx = (Math.random() - 0.5) * 0.3;
        const dz = (Math.random() - 0.5) * 0.3;
        const stalkGeo = new THREE.CylinderGeometry(0.04, 0.06, h, 6);
        const stalkMat = new THREE.MeshStandardMaterial({ color: 0x6b8e23 });
        const stalk = new THREE.Mesh(stalkGeo, stalkMat);
        stalk.position.set(dx, h / 2, dz);
        group.add(stalk);
      }
      // Leaf tufts along the stalk tops (no sphere)
      for (let j = 0; j < 4; j++) {
        const leafGeo = new THREE.CylinderGeometry(0, 0.15, 0.6, 4);
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x4e8c20 });
        const leaf = new THREE.Mesh(leafGeo, leafMat);
        leaf.position.set((Math.random() - 0.5) * 0.4, h * 0.9 + Math.random() * 0.3, (Math.random() - 0.5) * 0.4);
        leaf.rotation.z = (Math.random() - 0.5) * 0.8;
        group.add(leaf);
      }
      group.position.set(x, 0, z);
      return group;
    }

    // Bamboo along 3 sides: left (11→13), bottom (13→14), diagonal (14→12)
    // Offset ~0.7m inward from boundary, 1m spacing, start at E76 (z≈2)
    const bambooOffset = 0.7;

    // Side E: left side, x=0+offset, z from 2 to 18.9
    for (let z = 2; z <= 18.9; z += 1) {
      scene.add(createBamboo(bambooOffset, z));
    }
    // Side D: bottom, z=18.9-offset, x from 0 to 24.3
    for (let x = 0; x <= 24.3; x += 1) {
      scene.add(createBamboo(x, 18.9 - bambooOffset));
    }
    // Side C diagonal: 14(24.3,18.9) → 12(33,0), offset inward (perpendicular)
    const c14x = 24.3, c14z = 18.9, c12x = 33, c12z = 0;
    const cdx = c12x - c14x, cdz = c12z - c14z;
    const cLen = Math.sqrt(cdx * cdx + cdz * cdz);
    // Normal pointing inward (left of direction 14→12)
    const cnx = -cdz / cLen * bambooOffset;
    const cnz = cdx / cLen * bambooOffset;
    const cSteps = Math.floor(cLen);
    for (let i = 0; i <= cSteps; i++) {
      const t = i / cSteps;
      const bx = c14x + cdx * t + cnx;
      const bz = c14z + cdz * t + cnz;
      scene.add(createBamboo(bx, bz));
    }

    // Road: trapezoid between node 9-10 line (z=-4) and node 11-12 line (z=0)
    // Includes shoulder (x=0 to 1) + road (x=1 to ~34)
    const roadShape = new THREE.Shape();
    // Shoulder + road combined shape
    // Top-left: (0, -4), Top-right: (34.8, -4), Bot-right: (33, 0), Bot-left: (0, 0)
    roadShape.moveTo(0, 4);      // negate z for Shape 2D
    roadShape.lineTo(34.8, 4);
    roadShape.lineTo(33, 0);
    roadShape.lineTo(0, 0);
    roadShape.closePath();

    const roadGeo = new THREE.ShapeGeometry(roadShape);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0xe8e4dc, side: THREE.DoubleSide });
    const roadMesh = new THREE.Mesh(roadGeo, roadMat);
    roadMesh.rotation.x = -Math.PI / 2;
    roadMesh.position.y = 0.03;
    roadMesh.receiveShadow = true;
    scene.add(roadMesh);

    // Vertical incoming road from north (~5m section): x=1 to 5, z=-8.3 to -4
    const vRoadShape = new THREE.Shape();
    vRoadShape.moveTo(1, 8.3);   // negate z for Shape 2D
    vRoadShape.lineTo(5, 8.3);
    vRoadShape.lineTo(5, 4);
    vRoadShape.lineTo(1, 4);
    vRoadShape.closePath();
    const vRoadGeo = new THREE.ShapeGeometry(vRoadShape);
    const vRoadMesh = new THREE.Mesh(vRoadGeo, roadMat);
    vRoadMesh.rotation.x = -Math.PI / 2;
    vRoadMesh.position.y = 0.03;
    vRoadMesh.receiveShadow = true;
    scene.add(vRoadMesh);

    // Shoulder strip (darker, x=0 to 1) — horizontal road portion
    const shoulderShape = new THREE.Shape();
    shoulderShape.moveTo(0, 4);
    shoulderShape.lineTo(1, 4);
    shoulderShape.lineTo(1, 0);
    shoulderShape.lineTo(0, 0);
    shoulderShape.closePath();

    const shoulderGeo = new THREE.ShapeGeometry(shoulderShape);
    const shoulderMat = new THREE.MeshStandardMaterial({ color: 0xc8b8a0, side: THREE.DoubleSide });
    const shoulderMesh = new THREE.Mesh(shoulderGeo, shoulderMat);
    shoulderMesh.rotation.x = -Math.PI / 2;
    shoulderMesh.position.y = 0.04;
    scene.add(shoulderMesh);

    // Shoulder strip along vertical road (x=0 to 1, z=-8.3 to 0)
    const vShoulderShape = new THREE.Shape();
    vShoulderShape.moveTo(0, 8.3);
    vShoulderShape.lineTo(1, 8.3);
    vShoulderShape.lineTo(1, 4);
    vShoulderShape.lineTo(0, 4);
    vShoulderShape.closePath();
    const vShoulderGeo = new THREE.ShapeGeometry(vShoulderShape);
    const vShoulderMesh = new THREE.Mesh(vShoulderGeo, shoulderMat);
    vShoulderMesh.rotation.x = -Math.PI / 2;
    vShoulderMesh.position.y = 0.04;
    scene.add(vShoulderMesh);

    // Water ripple texture (canvas-based)
    const waterCanvas = document.createElement('canvas');
    waterCanvas.width = 128;
    waterCanvas.height = 128;
    const wCtx = waterCanvas.getContext('2d');
    wCtx.fillStyle = 'rgba(74,159,216,0.3)';
    wCtx.fillRect(0, 0, 128, 128);
    for (let i = 0; i < 128; i += 8) {
      wCtx.fillStyle = `rgba(255,255,255,${0.05 + Math.sin(i * 0.15) * 0.05})`;
      wCtx.fillRect(0, i, 128, 3);
    }
    const waterTex = new THREE.CanvasTexture(waterCanvas);
    waterTex.wrapS = waterTex.wrapT = THREE.RepeatWrapping;
    waterTex.repeat.set(3, 6);

    // Waterway along side C: from near node 12 to beyond node 14
    // Inner edge: plot boundary C (12→14 extended to 8)
    // Outer edge: ~4m further out (28 SVG units)
    // Node 8: SVG(430,540) → 3D(40, -15.4)
    // Node 12: (33, 0), Node 14: (24.3, 18.9)
    // Outer: SVG(458,546)→(345,792) → 3D(44.0,-14.6)→(27.9,20.6)
    const waterShape = new THREE.Shape();
    // Inner boundary (plot side)
    waterShape.moveTo(40, 15.4);      // node 8 (negate z → positive)
    waterShape.lineTo(33, 0);         // node 12
    waterShape.lineTo(24.3, -18.9);   // node 14
    // Outer boundary
    waterShape.lineTo(27.9, -20.6);   // outer bottom (345,792)
    waterShape.lineTo(44.0, 14.6);    // outer top (458,546)
    waterShape.closePath();

    const waterGeo = new THREE.ShapeGeometry(waterShape);
    const waterMat = new THREE.MeshStandardMaterial({
      color: 0x2a7fc8, map: waterTex, transparent: true, opacity: 0.85, side: THREE.DoubleSide
    });
    const waterMesh = new THREE.Mesh(waterGeo, waterMat);
    waterMesh.rotation.x = -Math.PI / 2;
    waterMesh.position.y = -0.05;
    scene.add(waterMesh);

    // Bridge: spans waterway at diagonal (4m wide)
    // SVG polygon: (395,620)→(420,632)→(406,660)→(381,648)
    const bridgeShape = new THREE.Shape();
    const bp1 = svgTo3D(395, 620); // (35, -4)
    const bp2 = svgTo3D(420, 632); // (38.6, -2.3)
    const bp3 = svgTo3D(406, 660); // (36.6, 1.7)
    const bp4 = svgTo3D(381, 648); // (33, 0)
    bridgeShape.moveTo(bp1.x, -bp1.z);
    bridgeShape.lineTo(bp2.x, -bp2.z);
    bridgeShape.lineTo(bp3.x, -bp3.z);
    bridgeShape.lineTo(bp4.x, -bp4.z);
    bridgeShape.closePath();

    const bridgeGeo = new THREE.ExtrudeGeometry(bridgeShape, { depth: 0.3, bevelEnabled: false });
    const bridgeMat = new THREE.MeshStandardMaterial({ color: 0xddd0b8 });
    const bridgeMesh = new THREE.Mesh(bridgeGeo, bridgeMat);
    bridgeMesh.rotation.x = -Math.PI / 2;
    bridgeMesh.position.y = 0.1;
    scene.add(bridgeMesh);

    // Bridge railings (2 lines along the long edges)
    const railMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
    [[bp1, bp2], [bp4, bp3]].forEach(([a, b]) => {
      const dx = b.x - a.x, dz = b.z - a.z;
      const len = Math.sqrt(dx * dx + dz * dz);
      const railGeo = new THREE.BoxGeometry(len, 0.6, 0.08);
      const rail = new THREE.Mesh(railGeo, railMat);
      rail.position.set((a.x + b.x) / 2, 0.5, (a.z + b.z) / 2);
      rail.rotation.y = -Math.atan2(dz, dx);
      scene.add(rail);
    });

    // ===== Step 5: Labels + North Arrow =====

    // Helper: create a CSS2D label
    function makeLabel(text, x, y, z, color = '#333', fontSize = '13px') {
      const div = document.createElement('div');
      div.textContent = text;
      div.style.color = color;
      div.style.fontSize = fontSize;
      div.style.fontFamily = 'Arial, sans-serif';
      div.style.fontWeight = 'bold';
      div.style.textShadow = '0 0 3px rgba(255,255,255,0.8)';
      div.style.whiteSpace = 'nowrap';
      const label = new CSS2DObject(div);
      label.position.set(x, y, z);
      return label;
    }

    // Zone labels
    scene.add(makeLabel('บ้าน 6×6', houseX + 3, houseBase + houseH + 3, houseZ + 3, '#8B4513', '14px'));
    scene.add(makeLabel('ลานจอดรถ', 14, 3.2, 3, '#555', '12px'));
    scene.add(makeLabel('แปลงผัก', vegX + vegW / 2, 1.5, vegZ + vegD / 2, '#2d6b12', '12px'));
    scene.add(makeLabel('ถังน้ำ', tankX + 0.6, 2, tankZ + 0.8, '#2288aa', '11px'));
    scene.add(makeLabel('ต้นไม้บังแดดบ่าย', 6, 6, 9, '#1a6b1a', '12px'));
    scene.add(makeLabel('ต้นผลไม้', 21, 3.5, 15, '#5a8a2a', '11px'));
    scene.add(makeLabel('ชานบ้าน', terraceX + terraceW / 2, houseBase + 1.5, terraceZ + terraceD / 2, '#8B4513', '11px'));
    scene.add(makeLabel('แนวไผ่', 0.7, 5, 10, '#3a6a10', '11px'));
    scene.add(makeLabel('ถนน', 16, 0.5, -2, '#666', '12px'));
    scene.add(makeLabel('ทางเข้า ↓', 3, 0.5, -6, '#cc3300', '11px'));
    scene.add(makeLabel('ลำน้ำ', 38, 1, 5, '#1a6699', '12px'));
    scene.add(makeLabel('สะพาน', 37, 1.5, 0, '#8B7355', '11px'));

    // (node labels and north arrow removed)

    // ===== Grid (clipped to zone boundary 11-12-14-13) =====
    // Zone: n11(0,0), n12(33,0), n14(24.3,18.9), n13(0,18.9)
    // Side C (12→14): diagonal, x goes from 33 at z=0 to 24.3 at z=18.9
    function zoneMaxX(z) {
      // Linear interpolation along side C (12→14)
      if (z <= 0) return n12.x;
      if (z >= n13.z) return n14.x;
      const t = z / n13.z;
      return n12.x + (n14.x - n12.x) * t;
    }
    const gridY = 0.01;
    const gridMat = new THREE.LineBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.8 });
    const gridPoints = [];
    // Horizontal lines (along x, every 1m in z)
    for (let z = 0; z <= n13.z; z += 1) {
      const maxX = zoneMaxX(z);
      gridPoints.push(new THREE.Vector3(0, gridY, z), new THREE.Vector3(maxX, gridY, z));
    }
    // Vertical lines (along z, every 1m in x)
    for (let x = 0; x <= n12.x; x += 1) {
      // Find z range where this x is inside the zone
      const maxZ = x <= n14.x ? n13.z : (n12.x - x) / (n12.x - n14.x) * n13.z;
      if (maxZ > 0) {
        gridPoints.push(new THREE.Vector3(x, gridY, 0), new THREE.Vector3(x, gridY, maxZ));
      }
    }
    const gridGeo = new THREE.BufferGeometry().setFromPoints(gridPoints);
    const gridLines = new THREE.LineSegments(gridGeo, gridMat);
    scene.add(gridLines);

    // ===== Resize handler =====
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ===== Animate =====
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      waterTex.offset.y += 0.001;
      composer.render();
      labelRenderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
