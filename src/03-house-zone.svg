  <circle cx="185" cy="712" r="13" fill="#3a9a3a" opacity="0.45" stroke="#2a6a2a" stroke-width="0.8"/>
  <circle cx="202" cy="734" r="10" fill="#3a9a3a" opacity="0.45" stroke="#2a6a2a" stroke-width="0.8"/>
