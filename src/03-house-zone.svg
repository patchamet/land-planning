  <text x="133" y="800" font-family="Arial" font-size="14" font-weight="bold" fill="#c00" text-anchor="middle">13</text>
  <text x="338" y="800" font-family="Arial" font-size="14" font-weight="bold" fill="#c00" text-anchor="middle">14</text>

  <!-- Segment length labels -->
  <g font-family="Arial" font-size="10" fill="#aaa">
