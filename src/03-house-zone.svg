  <rect x="415" y="864" width="10" height="10" fill="#8ec8e8" stroke="#4499aa" stroke-width="0.7" rx="1"/>
  <text x="430" y="873" font-family="Arial" font-size="8" fill="#333">ถังน้ำ</text>

