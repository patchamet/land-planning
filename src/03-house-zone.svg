<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="55 590 440 330" width="880" height="660">
  <rect x="55" y="590" width="440" height="330" fill="white"/>

  <defs>
    <pattern id="grid1m" x="150" y="130" width="7" height="7" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="7" y2="0" stroke="#ccc" stroke-width="0.4"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#ccc" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="265" y="608" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">ผังพื้นที่สร้างบ้าน (โซน 11-12-14-13, ~540 ตร.ม.)</text>

  <!-- Context: Waterway strip along side C (12→14 portion) -->
  <polygon points="381,648 406,660 345,792 320,780"
    fill="#b8dff5" stroke="none" opacity="0.7"/>
  <line x1="406" y1="660" x2="345" y2="792"
    stroke="#444" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- Context: Horizontal road (E70-E74) above zone, faded -->
  <polygon points="157,620 393.3,620 380.5,648 157,648" fill="#e8e4dc" opacity="0.5"/>
  <line x1="185" y1="620" x2="393.3" y2="620" stroke="#444" stroke-width="1" stroke-dasharray="8,5" opacity="0.4"/>
  <line x1="157" y1="648" x2="380.5" y2="648" stroke="#444" stroke-width="1" stroke-dasharray="8,5" opacity="0.4"/>
  <text x="272" y="638" font-family="Arial" font-size="10" fill="#ccc" text-anchor="middle">ถนนภายใน</text>

  <!-- Context: Bridge -->
  <polygon points="395,620 420,632 406,660 381,648"
    fill="#ddd0b8" fill-opacity="0.6" stroke="#666" stroke-width="1"/>
  <text x="401" y="645" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">สะพาน</text>

  <!-- Zone fill: house building area -->
  <polygon points="150,648 381,648 320,780 150,780"
    fill="#4dbb4d" opacity="0.22" stroke="none"/>

  <!-- Grid inside zone -->
  <polygon points="150,648 381,648 320,780 150,780"
