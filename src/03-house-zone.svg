  <text x="135" y="726" font-family="Arial" font-size="9" fill="#4e8c20" text-anchor="middle" transform="rotate(-90,135,726)">แนวไผ่</text>

  <!-- Node circles -->
  <circle cx="150" cy="648" r="7" fill="white" stroke="#222" stroke-width="2"/>
  <circle cx="381" cy="648" r="7" fill="white" stroke="#222" stroke-width="2"/>
  <circle cx="150" cy="780" r="7" fill="white" stroke="#222" stroke-width="2"/>
  <circle cx="320" cy="780" r="7" fill="white" stroke="#222" stroke-width="2"/>

