  <text x="105" y="891" font-family="Arial" font-size="8" fill="#333">โซนสร้างบ้าน</text>

  <circle cx="185" cy="887" r="4" fill="#4e8c20" stroke="#2a5a10" stroke-width="0.5" opacity="0.85"/>
