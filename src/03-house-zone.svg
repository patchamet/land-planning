    <text x="140" y="717" text-anchor="end">~19ม.</text>
    <!-- 13→14 (bottom, ~24m) -->
    <text x="235" y="796" text-anchor="middle">~24ม.</text>
    <!-- 12→14 (diagonal, ~21m) -->
