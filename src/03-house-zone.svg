  <!-- ===== HOUSE ZONE LAYOUT ===== -->

  <!-- Parking (carport): 6x6m, flush with road -->
  <rect x="227" y="648" width="42" height="42" fill="#d0ccc4" opacity="0.8" stroke="#888" stroke-width="1" stroke-dasharray="4,3" rx="2"/>
  <text x="248" y="668" font-family="Arial" font-size="7" font-weight="bold" fill="#555" text-anchor="middle">P จอดรถ</text>
  <text x="248" y="678" font-family="Arial" font-size="5.5" fill="#555" text-anchor="middle">6x6ม.</text>

  <!-- House 6x6m -->
  <rect x="227" y="690" width="42" height="42" fill="#e8c888" stroke="#996633" stroke-width="1.5" rx="1"/>
  <line x1="227" y1="711" x2="269" y2="711" stroke="#996633" stroke-width="0.8"/>
  <!-- Door top (parking), shifted 1m toward veggie garden -->
  <rect x="248" y="687" width="14" height="5" fill="#996633" opacity="0.7" stroke="none"/>
