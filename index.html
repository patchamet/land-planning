<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แผนผังที่ดิน — Land Planning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #eef2f3;
      color: #3a4a5c;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(180,200,220,0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,200,220,0.18) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    header {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      color: #3a5a7c;
      padding: 24px 20px;
      text-align: center;
      border-bottom: 2px solid #c8dae8;
      position: relative;
    }
    header::before {
      content: '';
      position: absolute;
      left: 20px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px;
      border: 2px solid #7badc8;
      border-radius: 50%;
      opacity: 0.5;
    }
    header::after {
      content: '+';
      position: absolute;
      left: 27px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: #7badc8;
      opacity: 0.5;
    }
    header h1 {
      font-size: 1.5rem;
      margin-bottom: 2px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    header p {
      font-size: 0.8rem;
      color: #8aa4b8;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #c8dae8;
      box-shadow: 0 1px 4px rgba(60,90,120,0.06);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 8px; left: 8px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #a8c8e0;
      z-index: 1;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(60,90,120,0.12);
      border-color: #8ab4d0;
    }
    .card-thumb {
      width: 100%;
      height: 200px;
      background: #f4f7f9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px dashed #c8dae8;
      position: relative;
    }
    .card-thumb::after {
      content: '';
      position: absolute;
      bottom: 8px; right: 8px;
      width: 20px; height: 20px;
      border-right: 1.5px solid #b0c8d8;
      border-bottom: 1.5px solid #b0c8d8;
      opacity: 0.4;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }
    .card-thumb.is-3d {
      background: linear-gradient(135deg, #dbe8f0, #c4d6e4);
      color: #4a6a80;
      font-size: 3rem;
      flex-direction: column;
      gap: 8px;
    }
    .card-thumb.is-3d span {
      font-size: 0.8rem;
      color: #6a8a9c;
    }
    .card-body {
      padding: 12px 14px;
    }
    .card-body h3 {
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: #3a5a7c;
      font-weight: 600;
    }
    .card-body p {
      font-size: 0.78rem;
      color: #8a9aaa;
    }
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 600;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-svg { background: #e0eee8; color: #4a8a6a; border: 1px solid #c0dcd0; }
    .badge-3d { background: #deeaf4; color: #4a7a9c; border: 1px solid #bcd2e4; }
    footer {
      text-align: center;
      padding: 18px;
      font-size: 0.7rem;
      color: #b0bcc8;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <h1>แผนผังที่ดิน</h1>
    <p>Land Planning Project</p>
  </header>

  <main>
    <div class="grid">
      <a class="card" href="src/02-plot-full-plan.svg" target="_blank">
        <div class="card-thumb">
          <img src="src/02-plot-full-plan.svg" alt="ผังที่ดิน + ผังบ้าน">
        </div>
        <div class="card-body">
          <h3>ผังที่ดิน + ผังบ้าน <span class="badge badge-svg">SVG</span></h3>
          <p>ผังรวมพร้อมตำแหน่งบ้าน ชานบ้าน ลานจอดรถ</p>
        </div>
      </a>
      <a class="card" href="src/03-house-zone.svg" target="_blank">
        <div class="card-thumb">
          <img src="src/03-house-zone.svg" alt="ผังโซนบ้าน">
        </div>
        <div class="card-body">
          <h3>ผังโซนบ้าน (ซูม) <span class="badge badge-svg">SVG</span></h3>
          <p>โซน 11-12-14-13 (~540 ตร.ม.) แสดงรายละเอียด</p>
        </div>
      </a>
      <a class="card" href="src/04-house-zone-3d.html" target="_blank">
        <div class="card-thumb is-3d">
          🏠
          <span>คลิกเพื่อเปิดโมเดล 3D</span>
        </div>
        <div class="card-body">
          <h3>โมเดล 3D <span class="badge badge-3d">3D</span></h3>
          <p>หมุน ซูม ปรับแสงแดดตามเวลาได้</p>
        </div>
      </a>
    </div>
  </main>

  <footer>Land Planning Project</footer>
</body>
</html>
