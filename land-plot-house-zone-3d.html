<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ผังพื้นที่สร้างบ้าน 3D (โซน 11-12-14-13)</title>
  <style>
    body { margin: 0; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: #fff; font-family: Arial, sans-serif; font-size: 14px;
      background: rgba(0,0,0,0.5); padding: 10px 14px; border-radius: 6px;
    }
    #info h3 { margin: 0 0 4px 0; font-size: 15px; }
    #info p { margin: 0; font-size: 12px; color: #ccc; }
  </style>
</head>
<body>
  <div id="info">
    <h3>ผังพื้นที่สร้างบ้าน 3D</h3>
    <p>โซน 11-12-14-13 (~540 ตร.ม.)</p>
    <p>คลิกลาก = หมุน | scroll = ซูม | คลิกขวาลาก = เลื่อน</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ===== Scene, Camera, Renderer =====
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd4e6f1);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(16, 25, 35);
    camera.lookAt(12, 0, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // ===== OrbitControls =====
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(12, 0, 10);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    // ===== Lights (basic for now) =====
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(20, 30, -10);
    scene.add(dirLight);

    // ===== Coordinate conversion: SVG → 3D =====
    // Origin = node 11 (SVG 150,648), scale: 7 SVG units = 1m
    function svgTo3D(sx, sy) {
      return { x: (sx - 150) / 7, z: (sy - 648) / 7 };
    }

    // ===== Zone ground (trapezoid 11-12-14-13) =====
    const n11 = svgTo3D(150, 648); // (0, 0)
    const n12 = svgTo3D(381, 648); // (33, 0)
    const n14 = svgTo3D(320, 780); // (24.3, 18.9)
    const n13 = svgTo3D(150, 780); // (0, 18.9)

    const groundShape = new THREE.Shape();
    groundShape.moveTo(n11.x, -n11.z); // negate z for Shape (2D y = -z)
    groundShape.lineTo(n12.x, -n12.z);
    groundShape.lineTo(n14.x, -n14.z);
    groundShape.lineTo(n13.x, -n13.z);
    groundShape.closePath();

    const groundGeo = new THREE.ShapeGeometry(groundShape);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x4dbb4d,
      transparent: true,
      opacity: 0.4,
      side: THREE.DoubleSide
    });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    groundMesh.rotation.x = -Math.PI / 2; // lay flat on x-z plane
    groundMesh.position.y = 0;
    scene.add(groundMesh);

    // ===== Zone boundary outline =====
    const boundaryPoints = [
      new THREE.Vector3(n11.x, 0.02, n11.z),
      new THREE.Vector3(n12.x, 0.02, n12.z),
      new THREE.Vector3(n14.x, 0.02, n14.z),
      new THREE.Vector3(n13.x, 0.02, n13.z),
      new THREE.Vector3(n11.x, 0.02, n11.z)
    ];
    const boundaryGeo = new THREE.BufferGeometry().setFromPoints(boundaryPoints);
    const boundaryLine = new THREE.Line(boundaryGeo, new THREE.LineBasicMaterial({ color: 0x222222, linewidth: 2 }));
    scene.add(boundaryLine);

    // ===== Node markers (corner posts) =====
    const nodePositions = [
      { pos: n11, label: '11' },
      { pos: n12, label: '12' },
      { pos: n13, label: '13' },
      { pos: n14, label: '14' }
    ];
    nodePositions.forEach(({ pos }) => {
      const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 1, 8);
      const postMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
      const post = new THREE.Mesh(postGeo, postMat);
      post.position.set(pos.x, 0.5, pos.z);
      scene.add(post);
    });

    // ===== Step 2: House + Parking =====

    // Parking (carport): 6×6m, flush with road, y=0 (flat slab)
    // SVG top-left: (227, 648) → 3D: (11, 0)
    const parkingGeo = new THREE.BoxGeometry(6, 0.1, 6);
    const parkingMat = new THREE.MeshStandardMaterial({ color: 0xd0ccc4 });
    const parking = new THREE.Mesh(parkingGeo, parkingMat);
    parking.position.set(11 + 3, 0.05, 0 + 3);
    scene.add(parking);

    // Parking roof (flat carport cover, 6×6m, height 2.8m)
    const carportRoofGeo = new THREE.BoxGeometry(6, 0.08, 6);
    const carportRoofMat = new THREE.MeshStandardMaterial({ color: 0xb0a898, transparent: true, opacity: 0.6 });
    const carportRoof = new THREE.Mesh(carportRoofGeo, carportRoofMat);
    carportRoof.position.set(11 + 3, 2.8, 0 + 3);
    scene.add(carportRoof);

    // Carport pillars (4 corners)
    const pillarGeo = new THREE.CylinderGeometry(0.1, 0.1, 2.8, 8);
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
    [[11.3, 0.3], [16.7, 0.3], [11.3, 5.7], [16.7, 5.7]].forEach(([px, pz]) => {
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.set(px, 1.4, pz);
      scene.add(pillar);
    });

    // House walls: 6×6m, height 3m
    // SVG top-left: (227, 690) → 3D: (11, 6)
    const houseX = 11;
    const houseZ = 6;
    const houseW = 6;
    const houseD = 6;
    const houseH = 3;

    const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8c888 });

    // 4 walls (thin boxes)
    // Front wall (facing parking, z=6) with door gap
    // Left portion of front wall
    const frontLeftGeo = new THREE.BoxGeometry(2, houseH, 0.15);
    const frontLeft = new THREE.Mesh(frontLeftGeo, wallMat);
    frontLeft.position.set(houseX + 1, houseH / 2, houseZ + 0.075);
    scene.add(frontLeft);
    // Right portion of front wall
    const frontRightGeo = new THREE.BoxGeometry(2.7, houseH, 0.15);
    const frontRight = new THREE.Mesh(frontRightGeo, wallMat);
    frontRight.position.set(houseX + 4.65, houseH / 2, houseZ + 0.075);
    scene.add(frontRight);
    // Door frame top (above door)
    const doorTopGeo = new THREE.BoxGeometry(1.3, 0.8, 0.15);
    const doorTop = new THREE.Mesh(doorTopGeo, wallMat);
    doorTop.position.set(houseX + 3, 2.6, houseZ + 0.075);
    scene.add(doorTop);

    // Back wall (z=12)
    const backGeo = new THREE.BoxGeometry(houseW, houseH, 0.15);
    const backWall = new THREE.Mesh(backGeo, wallMat);
    backWall.position.set(houseX + 3, houseH / 2, houseZ + houseD - 0.075);
    scene.add(backWall);

    // Left wall (x=11)
    const leftGeo = new THREE.BoxGeometry(0.15, houseH, houseD);
    const leftWall = new THREE.Mesh(leftGeo, wallMat);
    leftWall.position.set(houseX + 0.075, houseH / 2, houseZ + 3);
    scene.add(leftWall);

    // Right wall (x=17) with door gap for veggie garden
    const rightTopGeo = new THREE.BoxGeometry(0.15, houseH, 2);
    const rightTop = new THREE.Mesh(rightTopGeo, wallMat);
    rightTop.position.set(houseX + houseW - 0.075, houseH / 2, houseZ + 1);
    scene.add(rightTop);
    const rightBotGeo = new THREE.BoxGeometry(0.15, houseH, 2);
    const rightBot = new THREE.Mesh(rightBotGeo, wallMat);
    rightBot.position.set(houseX + houseW - 0.075, houseH / 2, houseZ + 5);
    scene.add(rightBot);
    const rightDoorTopGeo = new THREE.BoxGeometry(0.15, 0.8, 2);
    const rightDoorTop = new THREE.Mesh(rightDoorTopGeo, wallMat);
    rightDoorTop.position.set(houseX + houseW - 0.075, 2.6, houseZ + 3);
    scene.add(rightDoorTop);

    // Floor
    const floorGeo = new THREE.BoxGeometry(houseW, 0.15, houseD);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xd4c4a0 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(houseX + 3, 0.075, houseZ + 3);
    scene.add(floor);

    // Roof (gable / triangular prism) — no rotation, extrude along Z
    const roofShape = new THREE.Shape();
    roofShape.moveTo(-3.3, 0);   // left overhang
    roofShape.lineTo(0, 2.2);    // ridge peak
    roofShape.lineTo(3.3, 0);    // right overhang
    roofShape.closePath();

    const roofGeo = new THREE.ExtrudeGeometry(roofShape, { depth: 6.6, bevelEnabled: false });
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x996633 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    // Profile in X-Y, extruded along +Z. Center on house.
    roof.position.set(houseX + houseW / 2, houseH, houseZ - 0.3);
    scene.add(roof);

    // ===== Grid (ground reference) =====
    const gridHelper = new THREE.GridHelper(40, 40, 0xaaaaaa, 0xdddddd);
    gridHelper.position.set(16, -0.01, 10);
    scene.add(gridHelper);

    // ===== Resize handler =====
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ===== Animate =====
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
